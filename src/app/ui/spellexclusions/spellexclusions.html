<!DOCTYPE html>
<html lang="vi" window-frame="transparent">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loại trừ chính tả</title>
    <link rel="stylesheet" href="../shared/theme.css">
    <link rel="stylesheet" href="../shared/base.css">
    <link rel="stylesheet" href="../shared/subdialog.css">
    <link rel="stylesheet" href="../shared/dropdown.css">
    <link rel="stylesheet" href="spellexclusions.css">
    <script src="../shared/strings.js"></script>
    <script src="../shared/i18n.js"></script>
    <script src="../shared/utils.js"></script>
    <script src="spellexclusions.js"></script>
</head>

<body>
    <div class="container" id="main-container">
        <!-- Title Bar -->
        <div class="title-bar">
            <span class="title-text" data-i18n="s.spell_exclusions">Loại trừ chính tả</span>
            <button class="btn-close" id="btn-close" title="Đóng">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24"
                    fill="rgba(240,23,23,1)">
                    <path
                        d="M12 22C6.47715 22 2 17.5228 2 12C2 6.47715 6.47715 2 12 2C17.5228 2 22 6.47715 22 12C22 17.5228 17.5228 22 12 22ZM12 10.5858L9.17157 7.75736L7.75736 9.17157L10.5858 12L7.75736 14.8284L9.17157 16.2426L12 13.4142L14.8284 16.2426L16.2426 14.8284L13.4142 12L16.2426 9.17157L14.8284 7.75736L12 10.5858Z">
                    </path>
                </svg>
            </button>
        </div>

        <!-- Main Content Section -->
        <div class="content-section">
            <!-- Info text -->
            <div class="info-text" data-i18n="se.info">Viết tắt bỏ qua kiểm tra chính tả. Khớp từ đầu, tối thiểu 2 ký tự. VD: hđ sẽ bỏ qua hđ, hđt, hđqt...</div>

            <!-- Input Card -->
            <div class="settings-card">
                <div class="setting-row">
                    <span class="setting-label" data-i18n="se.word">Từ khóa</span>
                    <div class="input-container">
                        <input type="text" class="setting-input" id="entry-name" placeholder="vd: hđ"
                            autocomplete="off">
                    </div>
                </div>
                <div class="button-row">
                    <button class="btn-action btn-primary" id="btn-add" data-i18n="add">+ Thêm</button>
                </div>
            </div>

            <!-- List Card -->
            <div class="settings-card list-card">
                <div class="list-header">
                    <span class="list-col-name" data-i18n="se.exclusion_list">Danh sách loại trừ</span>
                    <span class="list-col-action"></span>
                </div>
                <div class="app-list" id="entry-list">
                    <!-- Items inserted by C++ -->
                </div>
            </div>

            <!-- Footer Buttons -->
            <div class="button-row footer-row">
                <button class="btn-action btn-secondary" id="btn-import" data-i18n="ea.import">Nạp từ file...</button>
                <button class="btn-action btn-secondary" id="btn-export" data-i18n="ea.export">Xuất ra file...</button>
            </div>
        </div>

        <!-- Hidden inputs for C++ -->
        <input type="hidden" id="val-action" value="">
        <input type="hidden" id="val-entry-name" value="">
    </div>
</body>

</html>
